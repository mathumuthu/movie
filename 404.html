
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:600px;
    width:100%;
    background:#fff;
    padding:40px 30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    font-size:100px;
    color:#e63946;
    margin-bottom:10px;
}

h2{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#666;
    line-height:1.7;
    margin-bottom:20px;
}

.contact-box{
    background:#fafafa;
    border:1px solid #ddd;
    padding:20px;
    border-radius:8px;
    margin:20px 0;
}

.contact-box h3{
    margin-bottom:10px;
    color:#333;
}

.contact-box p{
    margin:8px 0;
}

.buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:12px 24px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    opacity:.9;
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#888;
}

@media(max-width:600px){

    h1{
        font-size:70px;
    }

    .container{
        padding:25px 20px;
    }

    .btn{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
        Sorry, the page you are looking for may have been removed,
        renamed, or is temporarily unavailable.
    </p>

    <div class="buttons">
        <button class="btn" onclick="goBack()">
            ← Previous Page
        </button>

        <a href="index.html" class="btn">
            🏠 Home Page
        </a>
    </div>

    <div class="contact-box">
        <h3>Need Help?</h3>

        <p>📞 Phone: +91 98765 43210</p>

        <p>📧 Email: support@yourwebsite.com</p>

        <p>🌐 Website: www.yourwebsite.com</p>
    </div>

    <div class="footer">
        © 2026 Your Website. All Rights Reserved.
    </div>

</div>

<script>
function goBack(){
    if(window.history.length > 1){
        window.history.back();
    }else{
        window.location.href="index.html";
    }
}
</script>

</body>
</html>
