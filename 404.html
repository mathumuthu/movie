<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    text-align:center;
}

.container{
    padding:20px;
}

h1{
    font-size:80px;
    margin:0;
    color:#333;
}

p{
    color:#666;
    margin:10px 0 20px;
}

a{
    text-decoration:none;
    background:#333;
    color:#fff;
    padding:10px 20px;
    border-radius:5px;
    transition:0.3s;
}

a:hover{
    background:#555;
}
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Page Not Found</p>
    <a href="index.html">Go Home</a>
</div>

</body>
</html>
